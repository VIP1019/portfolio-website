<div style="font-family: system-ui, sans-serif, Arial; font-size: 14px; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f9f9f9;">
  <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 10px 10px 0 0; text-align: center;">
    <h1 style="color: white; margin: 0; font-size: 24px;">New Contact Form Submission</h1>
  </div>
  
  <div style="background-color: white; padding: 30px; border-radius: 0 0 10px 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <p style="font-size: 16px; color: #555; margin-bottom: 20px;">Hello,</p>
    
    <p style="font-size: 14px; color: #666; margin-bottom: 25px;">You have received a new contact form submission from your portfolio website.</p>
    
    <div style="background-color: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
      <table style="width: 100%; border-collapse: collapse;">
        <tr>
          <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            <strong style="color: #667eea;">👤 Name:</strong>
          </td>
          <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0; text-align: right;">
            {{from_name}}
          </td>
        </tr>
        <tr>
          <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            <strong style="color: #667eea;">📧 Email:</strong>
          </td>
          <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0; text-align: right;">
            <a href="mailto:{{from_email}}" style="color: #764ba2; text-decoration: none;">{{from_email}}</a>
          </td>
        </tr>
        <tr>
          <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            <strong style="color: #667eea;">📋 Subject:</strong>
          </td>
          <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0; text-align: right;">
            {{subject}}
          </td>
        </tr>
      </table>
    </div>
    
    <div style="background-color: #f0f4ff; padding: 20px; border-left: 4px solid #667eea; border-radius: 4px; margin-bottom: 20px;">
      <p style="margin: 0 0 10px 0; color: #667eea; font-weight: bold;">💬 Message:</p>
      <p style="margin: 0; color: #555; white-space: pre-wrap;">{{message}}</p>
    </div>
    
    <div style="margin-top: 30px; padding-top: 20px; border-top: 2px dashed #e0e0e0; text-align: center;">
      <p style="color: #999; font-size: 12px; margin: 0;">Sent from Portfolio Contact Form</p>
      <p style="color: #999; font-size: 12px; margin: 5px 0 0 0;">princejheck.juan@email.com</p>
    </div>
  </div>
</div>
